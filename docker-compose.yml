version: '3.8'

services:
  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: openfix
      POSTGRES_PASSWORD: openfix
      POSTGRES_DB: openfix
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - openfix-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openfix"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Frontend Angular with Nginx proxy
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - openfix-network

  # Backend API (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://openfix:openfix@postgres:5432/openfix
    volumes:
      - ./data:/app/data
      - ./repos:/app/repos
      - ./openclaw:/app/openclaw
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - openfix-network

  # OpenClaw Gateway (AI agent runtime)
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    environment:
      HOME: /home/node
    env_file:
      - ./openclaw/openclaw.env
    volumes:
      - ./openclaw/openclaw.json:/home/node/.openclaw/openclaw.json
      - ./openclaw/workspace:/home/node/.openclaw/workspace
      - ./repos:/home/node/repos
    ports:
      - "18789:18789"
    command: ["node", "dist/index.js", "gateway", "--bind", "lan", "--port", "18789"]
    networks:
      - openfix-network

  # OpenClaw Agent (bridge between backend and OpenClaw gateway)
  agent:
    build:
      context: ./openclaw-agent
      dockerfile: Dockerfile
    environment:
      - BACKEND_URL=http://backend:3000
      - OPENCLAW_URL=ws://openclaw:18789
      - OPENCLAW_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-openfix-token}
    depends_on:
      - backend
    volumes:
      - ./repos:/app/repos
    networks:
      - openfix-network

volumes:
  pgdata:

networks:
  openfix-network:
    driver: bridge
