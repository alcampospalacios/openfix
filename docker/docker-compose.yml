version: '3.8'

services:
  # Frontend Angular
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "4200:4200"
    depends_on:
      - backend

  # Backend API (FastAPI)
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./config:/app/config

  # OpenClaw Agent (in Docker)
  openclaw:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - openclaw_data:/root/.openclaw
      - ../openclaw-agent:/app/agent
    command: sh -c "npm install -g openclaw && openclaw gateway start"
    ports:
      - "18789:18789"
    environment:
      - NODE_ENV=development

  # Optional: Database (for production)
  # postgres:
  #   image: postgres:15-alpine
  #   environment:
  #     - POSTGRES_USER=openfix
  #     - POSTGRES_PASSWORD=openfix
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data

volumes:
  openclaw_data:
  # postgres_data:
