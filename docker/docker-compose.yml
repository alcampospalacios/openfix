version: '3.8'

services:
  # Frontend Angular
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - backend

  # Backend API (FastAPI)
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - ./repos:/app/repos

  # OpenClaw Agent
  agent:
    build:
      context: ../openclaw-agent
      dockerfile: Dockerfile
    environment:
      - BACKEND_URL=http://backend:3000
    depends_on:
      - backend
    volumes:
      - ./repos:/app/repos
