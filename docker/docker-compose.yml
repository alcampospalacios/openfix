version: '3.8'

services:
  # Frontend Angular
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "4200:4200"
    environment:
      - API_URL=http://backend:3000
    depends_on:
      - backend

  # Backend API (FastAPI)
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    volumes:
      - ../backend:/app

  # Database (optional - for production)
  # postgres:
  #   image: postgres:15-alpine
  #   environment:
  #     - POSTGRES_USER=openfix
  #     - POSTGRES_PASSWORD=openfix
  #   ports:
  #     - "5432:5432"

  # Redis (optional - for production)
