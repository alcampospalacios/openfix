version: '3.8'

services:
  # Frontend Angular
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "4200:4200"
    depends_on:
      backend:
        condition: service_started

  # Backend API (FastAPI)
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data

  # OpenClaw Agent
  agent:
    build:
      context: ../openclaw-agent
      dockerfile: Dockerfile
    environment:
      - BACKEND_URL=http://backend:3000
    depends_on:
      backend:
        condition: service_started
    volumes:
      - agent-cache:/tmp/openfix-repo

volumes:
  agent-cache:
